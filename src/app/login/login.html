<div class="min-h-screen bg-gradient-to-br from-green-50 to-emerald-100 p-6 flex items-center justify-center">
  <div class="bg-white rounded-lg shadow-2xl p-8 w-full max-w-md">
    <!-- En-tête -->
    <div class="mb-8 text-center">
      <h1 class="text-4xl font-bold text-gray-800 mb-2">🔐 Connexion</h1>
      <p class="text-gray-600">Accédez à votre compte</p>
    </div>

    <form #formLogin="ngForm" class="space-y-6">
      <!-- Username -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Nom d'utilisateur</label>
        <input
          [(ngModel)]="login.username"
          name="username"
          type="text"
          required
          pattern="[a-zA-Z].*"
          class="w-full box-border px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-green-500 focus:outline-none transition text-lg"
          placeholder="Votre nom d'utilisateur"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Mot de passe</label>
        <input
          [(ngModel)]="login.password"
          name="password"
          type="password"
          required
          minlength="3"
          class="w-full box-border px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-green-500 focus:outline-none transition text-lg"
          placeholder="Minimum 3 caractères"
        />
      </div>

      <!-- Roles -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Rôles</label>
        <input
          [(ngModel)]="login.roles"
          name="roles"
          type="text"
          required
          class="w-full box-border px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-green-500 focus:outline-none transition text-lg"
          placeholder="Ex: admin, user"
        />
      </div>

      <!-- Login Button -->
      <button
        type="button"
        (click)="onLogin()"
        [disabled]="!formLogin.form.valid"
        class="w-full px-4 py-3 bg-green-500 text-white font-bold text-lg rounded-lg hover:bg-green-600 transition transform hover:scale-105 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100"
      >
        Se connecter →
      </button>
    </form>

    <!-- Message -->
    @if (message) {
      <div class="mt-6 p-4 bg-green-50 border-2 border-green-300 rounded-lg">
        <p class="text-green-700 font-semibold text-center">{{ message }}</p>
      </div>
    }
