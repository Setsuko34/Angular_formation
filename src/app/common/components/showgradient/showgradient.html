<div class="flex flex-col items-center gap-4">
  <p class="text-lg font-semibold text-gray-700">Couleur sélectionnée :</p>

  <!-- Carré gradient de la couleur -->
  @if (selectedColor()) {
    <div
      class="w-32 h-32 rounded-lg shadow-lg border-2 border-gray-300"
      [style]="getGradientStyle()"
    >
    </div>
    <p class="text-xl font-bold" [style.color]="getTextColor()">
      {{ selectedColor() }}
    </p>
  } @else {
    <div class="w-32 h-32 rounded-lg shadow-lg border-2 border-gray-300 bg-gray-200 flex items-center justify-center">
      <p class="text-gray-500 text-sm">Aucune couleur</p>
    </div>
    <p class="text-xl font-bold text-gray-500">-</p>
  }
</div>
